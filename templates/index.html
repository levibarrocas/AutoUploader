<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Uploader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a202c; color: #cbd5e0; }
    </style>
</head>
<body class="p-6 font-sans">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-white">Recent Captures</h1>
            <div class="flex space-x-3">
                <button onclick="toggleDateFilter()" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                    Toggle Dates
                </button>
                <button id="toggle-btn" onclick="toggleMode()" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                    Gallery Mode
                </button>
                <a href="/settings" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                    Settings
                </a>
            </div>
        </div>
        <div id="date-filter-container" class="hidden flex-wrap items-center gap-3 mb-6 bg-gray-800 p-4 rounded-lg shadow">
            <label class="text-white font-bold">Date Range:</label>
            <input type="date" id="start-date" onchange="applyDateFilter()" class="bg-gray-700 text-gray-200 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <span class="text-gray-400">to</span>
            <input type="date" id="end-date" onchange="applyDateFilter()" class="bg-gray-700 text-gray-200 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="clearDateFilter()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                Clear
            </button>
        </div>
        <div id="history-list" class="space-y-4">
            <!-- Items will be injected here -->
        </div>
        
        <div class="flex justify-center items-center space-x-4 mt-8 mb-4">
            <button id="prev-page" onclick="changePage(-1)" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed" disabled>Previous</button>
            <span class="text-white font-bold">Page <span id="current-page-display">1</span></span>
            <button id="next-page" onclick="changePage(1)" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed" disabled>Next</button>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col space-y-3 pointer-events-none"></div>

    <script>
        let currentData = [];
        let isGalleryMode = localStorage.getItem('galleryMode') === 'true';
        let lastLatestTimestamp = 0;
        let isFirstLoad = true;
        let currentPage = 1;

        function applyDateFilter() {
            isFirstLoad = true;
            currentPage = 1;
            fetchHistory();
        }
        
        function clearDateFilter() {
            document.getElementById('start-date').value = '';
            document.getElementById('end-date').value = '';
            applyDateFilter();
        }
        
        function toggleDateFilter() {
            const container = document.getElementById('date-filter-container');
            if (container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                container.classList.add('flex');
            } else {
                container.classList.add('hidden');
                container.classList.remove('flex');
                document.getElementById('start-date').value = '';
                document.getElementById('end-date').value = '';
                applyDateFilter();
            }
        }

        function changePage(delta) {
            currentPage += delta;
            if (currentPage < 1) currentPage = 1;
            isFirstLoad = true;
            fetchHistory();
        }

        async function fetchHistory() {
            try {
                const startVal = document.getElementById('start-date').value;
                const endVal = document.getElementById('end-date').value;
                
                let url = '/api/history';
                const params = new URLSearchParams();
                if (startVal) params.append('start', new Date(startVal + 'T00:00:00').getTime() / 1000);
                if (endVal) params.append('end', new Date(endVal + 'T23:59:59.999').getTime() / 1000);
                params.append('page', currentPage);
                if (params.toString()) url += '?' + params.toString();

                const response = await fetch(url);
                const data = await response.json();
                
                if (currentPage === 1 && data.length > 0) {
                    const currentLatestTimestamp = data[0].timestamp;
                    if (!isFirstLoad && currentLatestTimestamp > lastLatestTimestamp) {
                        const newItems = data.filter(item => item.timestamp > lastLatestTimestamp);
                        newItems.forEach(item => {
                            const filename = item.path.split('/').pop();
                            showToast(`New capture uploaded: ${filename}`);
                        });
                    }
                    lastLatestTimestamp = currentLatestTimestamp;
                }
                isFirstLoad = false;
                currentData = data;
                renderHistory(data);
                updatePaginationControls(data.length);
            } catch (error) {
                console.error("Error fetching history:", error);
            }
        }

        function toggleMode() {
            isGalleryMode = !isGalleryMode;
            localStorage.setItem('galleryMode', isGalleryMode);
            updateToggleButton();
            renderHistory(currentData);
        }

        function updateToggleButton() {
            const btn = document.getElementById('toggle-btn');
            if (btn) {
                btn.innerText = isGalleryMode ? 'List Mode' : 'Gallery Mode';
            }
        }

        function renderHistory(data) {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            if (isGalleryMode) {
                list.className = "grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-4";
                data.forEach(item => {
                    const filename = item.path.split('/').pop();
                    const el = document.createElement('div');
                    el.className = "bg-gray-800 rounded-lg shadow overflow-hidden aspect-square relative group cursor-pointer flex items-center justify-center bg-black";
                    el.onclick = () => copyGalleryLink(el, item.url);
                    el.innerHTML = `
                        <img src="/images/${filename}" alt="${filename}" class="max-w-full max-h-full object-contain">
                        <div class="absolute inset-0 bg-black bg-opacity-60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                            <span class="text-white font-bold text-lg pointer-events-none status-text">Copy URL</span>
                        </div>
                    `;
                    list.appendChild(el);
                });
            } else {
                list.className = "space-y-4";
                data.forEach(item => {
                    const filename = item.path.split('/').pop();
                    const date = new Date(item.timestamp * 1000).toLocaleString();
                    
                    const el = document.createElement('div');
                    el.className = "bg-gray-800 p-4 rounded-lg shadow flex items-center space-x-6 transition-all hover:bg-gray-700";
                    el.innerHTML = `
                        <div class="flex-shrink-0 w-32 h-32 bg-black flex items-center justify-center rounded overflow-hidden shadow-inner">
                            <img src="/images/${filename}" alt="${filename}" class="max-w-full max-h-full object-contain">
                        </div>
                        <div class="flex-grow min-w-0">
                            <h2 class="text-xl font-semibold text-white truncate" title="${filename}">${filename}</h2>
                            <p class="text-gray-400 text-sm mb-3">${date}</p>
                            <div class="flex items-center space-x-3">
                                <input type="text" readonly value="${item.url}" class="bg-gray-700 text-gray-200 p-2 rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <button onclick="copyToClipboard(this, '${item.url}')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded whitespace-nowrap transition duration-200">
                                    Copy Link
                                </button>
                            </div>
                        </div>
                    `;
                    list.appendChild(el);
                });
            }
        }

        function updatePaginationControls(fetchedCount) {
            const prevBtn = document.getElementById('prev-page');
            const nextBtn = document.getElementById('next-page');
            document.getElementById('current-page-display').innerText = currentPage;
            
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = fetchedCount < 200;
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const oldText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.classList.replace('bg-blue-600', 'bg-green-600');
                btn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                    btn.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
                }, 2000);
            });
        }
        
        function copyGalleryLink(el, text) {
            navigator.clipboard.writeText(text).then(() => {
                const statusSpan = el.querySelector('.status-text');
                const oldText = statusSpan.innerText;
                statusSpan.innerText = 'Copied!';
                statusSpan.classList.add('text-green-400');
                setTimeout(() => {
                    statusSpan.innerText = oldText;
                    statusSpan.classList.remove('text-green-400');
                }, 2000);
            });
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = "bg-green-600 text-white font-bold py-3 px-5 rounded-lg shadow-xl transform transition-all duration-300 translate-y-10 opacity-0 pointer-events-auto";
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });

            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        updateToggleButton();
        setInterval(fetchHistory, 2000);
        fetchHistory();
    </script>
</body>
</html>
