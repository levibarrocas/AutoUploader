<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Uploader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div style="max-width:1440px;margin:0 auto;">
        <div class="page-header">
            <div class="header-brand">
                <div class="brand-bar"></div>
                <h1>Recent Captures</h1>
            </div>
            <div class="header-actions">
                <button onclick="toggleDateFilter()" class="btn-icon" data-tip="Filter by Date">
                    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </button>
                <button id="toggle-btn" onclick="toggleMode()" class="btn-icon" data-tip="Gallery Mode">
                    <svg id="icon-gallery" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    <svg id="icon-list" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </button>
                <a href="/settings" class="btn-icon accent" data-tip="Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </a>
                <button onclick="toggleTheme()" class="btn-icon" id="theme-btn" data-tip="Toggle Theme">
                    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>

        <div id="date-filter-container" class="filter-bar">
            <span class="filter-label">Date Range</span>
            <input type="date" id="start-date" onchange="applyDateFilter()">
            <span class="filter-sep">→</span>
            <input type="date" id="end-date" onchange="applyDateFilter()">
            <button onclick="clearDateFilter()" class="btn-icon danger" data-tip="Clear Filter">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <div id="history-list"></div>

        <div class="pagination">
            <button id="prev-page" onclick="changePage(-1)" class="btn-icon" data-tip="Previous Page" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span class="page-indicator">PAGE <span id="current-page-display">1</span></span>
            <button id="next-page" onclick="changePage(1)" class="btn-icon" data-tip="Next Page" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        (function() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            const sun = document.getElementById('icon-sun');
            const moon = document.getElementById('icon-moon');
            if (sun && moon) {
                sun.style.display = saved === 'light' ? 'block' : 'none';
                moon.style.display = saved === 'dark' ? 'block' : 'none';
            }
        })();

        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('icon-sun').style.display = next === 'light' ? 'block' : 'none';
            document.getElementById('icon-moon').style.display = next === 'dark' ? 'block' : 'none';
        }

        let currentData = [];
        let isGalleryMode = localStorage.getItem('galleryMode') === 'true';
        let lastLatestTimestamp = 0;
        let isFirstLoad = true;
        let currentPage = 1;

        const ICON_COPY = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
        const ICON_CHECK = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
        const ICON_TRASH = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

        function applyDateFilter() { isFirstLoad = true; currentPage = 1; fetchHistory(); }

        function clearDateFilter() {
            document.getElementById('start-date').value = '';
            document.getElementById('end-date').value = '';
            applyDateFilter();
        }

        function toggleDateFilter() {
            const c = document.getElementById('date-filter-container');
            c.classList.toggle('open');
            if (!c.classList.contains('open')) {
                document.getElementById('start-date').value = '';
                document.getElementById('end-date').value = '';
                applyDateFilter();
            }
        }

        function changePage(delta) {
            currentPage += delta;
            if (currentPage < 1) currentPage = 1;
            isFirstLoad = true;
            fetchHistory();
        }

        async function fetchHistory() {
            try {
                const startVal = document.getElementById('start-date').value;
                const endVal = document.getElementById('end-date').value;
                let url = '/api/history';
                const params = new URLSearchParams();
                if (startVal) params.append('start', new Date(startVal + 'T00:00:00').getTime() / 1000);
                if (endVal) params.append('end', new Date(endVal + 'T23:59:59.999').getTime() / 1000);
                params.append('page', currentPage);
                if (params.toString()) url += '?' + params.toString();

                const response = await fetch(url);
                const data = await response.json();

                if (currentPage === 1 && data.length > 0) {
                    const currentLatestTimestamp = data[0].timestamp;
                    if (!isFirstLoad && currentLatestTimestamp > lastLatestTimestamp) {
                        data.filter(i => i.timestamp > lastLatestTimestamp)
                            .forEach(i => showToast('New capture: ' + i.path.split('/').pop()));
                    }
                    lastLatestTimestamp = currentLatestTimestamp;
                }
                isFirstLoad = false;
                currentData = data;
                renderHistory(data);
                updatePaginationControls(data.length);
            } catch (error) {
                console.error("Error fetching history:", error);
            }
        }

        function toggleMode() {
            isGalleryMode = !isGalleryMode;
            localStorage.setItem('galleryMode', isGalleryMode);
            updateToggleButton();
            renderHistory(currentData);
        }

        function updateToggleButton() {
            const btn = document.getElementById('toggle-btn');
            const gi = document.getElementById('icon-gallery');
            const li = document.getElementById('icon-list');
            if (isGalleryMode) {
                gi.style.display = 'none'; li.style.display = 'block';
                btn.setAttribute('data-tip', 'List Mode');
            } else {
                gi.style.display = 'block'; li.style.display = 'none';
                btn.setAttribute('data-tip', 'Gallery Mode');
            }
        }

        function renderHistory(data) {
            const list = document.getElementById('history-list');
            list.innerHTML = '';

            if (isGalleryMode) {
                list.className = 'gallery-grid';
                list.style = '';
                data.forEach(item => {
                    const filename = item.path.split('/').pop();
                    const el = document.createElement('div');
                    el.className = 'gallery-cell';
                    el.onclick = () => copyGalleryLink(el, item.url);
                    el.innerHTML = `
                        <img src="/images/${filename}" alt="${filename}">
                        <div class="gallery-overlay">
                            <span class="gallery-overlay-text status-text">Copy URL</span>
                        </div>
                    `;
                    list.appendChild(el);
                });
            } else {
                list.className = 'list-wrap';
                list.style = '';
                data.forEach(item => {
                    const filename = item.path.split('/').pop();
                    const date = new Date(item.timestamp * 1000).toLocaleString();
                    const el = document.createElement('div');
                    el.className = 'history-item';
                    el.innerHTML = `
                        <div class="thumb-wrap">
                            <img src="/images/${filename}" alt="${filename}">
                        </div>
                        <div class="item-meta">
                            <div class="item-name" title="${filename}">${filename}</div>
                            <div class="item-date">${date}</div>
                            <div class="item-actions">
                                <input type="text" readonly value="${item.url}">
                                <button onclick="copyToClipboard(this, '${item.url}')" class="btn-icon accent" data-tip="Copy Link">${ICON_COPY}</button>
                                <button onclick="deleteItem(${item.id})" class="btn-icon danger" data-tip="Remove from History">${ICON_TRASH}</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(el);
                });
            }
        }

        async function deleteItem(id) {
            if (confirm("Remove this capture from history?")) {
                await fetch(`/api/delete/${id}`, { method: 'POST' });
                fetchHistory();
            }
        }

        function updatePaginationControls(fetchedCount) {
            document.getElementById('current-page-display').innerText = currentPage;
            document.getElementById('prev-page').disabled = currentPage === 1;
            document.getElementById('next-page').disabled = fetchedCount < 200;
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.innerHTML = ICON_CHECK;
                btn.classList.remove('accent'); btn.classList.add('success');
                setTimeout(() => {
                    btn.innerHTML = ICON_COPY;
                    btn.classList.remove('success'); btn.classList.add('accent');
                }, 2000);
            });
        }

        function copyGalleryLink(el, text) {
            navigator.clipboard.writeText(text).then(() => {
                const span = el.querySelector('.status-text');
                span.innerText = 'Copied!';
                span.style.color = 'var(--success)';
                span.style.textShadow = '0 0 10px var(--success-glow)';
                setTimeout(() => {
                    span.innerText = 'Copy URL';
                    span.style.color = '';
                    span.style.textShadow = '';
                }, 2000);
            });
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        updateToggleButton();
        setInterval(fetchHistory, 2000);
        fetchHistory();
    </script>
</body>
</html>
