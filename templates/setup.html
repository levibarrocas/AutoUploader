<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Resizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 font-sans flex items-center justify-center min-h-screen bg-gray-900">
    <div class="w-full max-w-lg bg-gray-800 p-8 rounded-lg shadow-lg">
        <h1 class="text-3xl font-bold text-white mb-6 text-center">First Time Setup</h1>
        <p class="text-gray-400 mb-6 text-center">Please configure where your screenshots come from and where they should be saved.</p>
        
        <div class="space-y-6">
            <div>
                <label class="block text-gray-400 text-sm font-bold mb-2">Watch Folder (Source directory)</label>
                <input type="text" id="watch-folder" placeholder="/path/to/game/cap/" class="bg-gray-700 text-gray-200 p-3 rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-gray-400 text-sm font-bold mb-2">Output Folder (Destination directory)</label>
                <input type="text" id="output-folder" placeholder="/path/to/save/resized/" class="bg-gray-700 text-gray-200 p-3 rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <button onclick="finishSetup()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition duration-200">
                Save & Start
            </button>
        </div>
    </div>

    <script>
        async function finishSetup() {
            const watchFolder = document.getElementById('watch-folder').value.trim();
            const outputFolder = document.getElementById('output-folder').value.trim();
            
            if (!watchFolder || !outputFolder) {
                alert("Please provide both watch and output folders.");
                return;
            }
            
            const response = await fetch('/api/settings');
            let settings = await response.json();
            
            settings.watch_folders = [watchFolder];
            settings.output_folder = outputFolder;
            
            await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(settings)
            });
            
            window.location.href = '/';
        }
    </script>
</body>
</html>
